<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a8a"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7de"/>
      <stop offset="100%" style="stop-color:#4ecdc4"/>
    </linearGradient>
    <linearGradient id="bubble3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff59d"/>
      <stop offset="100%" style="stop-color:#ffe66d"/>
    </linearGradient>
    <linearGradient id="bubble4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e994"/>
      <stop offset="100%" style="stop-color:#95e1d3"/>
    </linearGradient>
    <linearGradient id="bubble5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fd8a8a"/>
      <stop offset="100%" style="stop-color:#f38181"/>
    </linearGradient>
    <linearGradient id="bubble6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b6ea"/>
      <stop offset="100%" style="stop-color:#aa96da"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Bubbles arranged like the game grid -->
  <!-- Row 1 -->
  <circle cx="18" cy="16" r="7" fill="url(#bubble1)"/>
  <circle cx="32" cy="16" r="7" fill="url(#bubble2)"/>
  <circle cx="46" cy="16" r="7" fill="url(#bubble3)"/>

  <!-- Row 2 (offset) -->
  <circle cx="11" cy="26" r="7" fill="url(#bubble4)"/>
  <circle cx="25" cy="26" r="7" fill="url(#bubble5)"/>
  <circle cx="39" cy="26" r="7" fill="url(#bubble1)"/>
  <circle cx="53" cy="26" r="7" fill="url(#bubble6)"/>

  <!-- Row 3 -->
  <circle cx="18" cy="36" r="7" fill="url(#bubble2)"/>
  <circle cx="32" cy="36" r="7" fill="url(#bubble6)"/>
  <circle cx="46" cy="36" r="7" fill="url(#bubble4)"/>

  <!-- Shooter arrow -->
  <path d="M32 42 L32 58 M28 54 L32 58 L36 54" stroke="#4ecdc4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="32" cy="40" r="6" fill="url(#bubble3)"/>
</svg>
